          - generic [ref=e111]: met een gezicht.
        - paragraph [ref=e112]:
          - text: Prince Schilder en Klusbedrijf is meer dan een verfkwast en een ladder. Gurdeep Singh heeft meer dan twintig jaar ervaring in het schildersvak en richtte vijf jaar geleden zijn eigen bedrijf op in Amsterdam. Die kennis en toewijding zitten in elke klus, groot of klein.
          - text: "Wij werken voor particulieren, VvE's en bedrijven die begrijpen dat goed werk zijn prijs waard is. Van een enkele kamer tot een volledig pand in Noord-Holland: wij nemen elk project even serieus en leveren altijd op tijd op."
      - generic [ref=e113]:
        - generic [ref=e114]:
          - generic [ref=e115]: "01"
          - paragraph [ref=e116]: "Wij zijn opgericht met één overtuiging: schilderwerk moet goed zijn, of het doet er niet toe. Gurdeep Singh begon als vakman op de steiger en kent het vak van binnenuit na meer dan twintig jaar in het schildersvak. Die kennis nemen wij mee op elke klus."
        - generic [ref=e117]:
          - generic [ref=e118]: "02"
          - paragraph [ref=e119]: U belt ons en u spreekt direct met de vakman die bij u langs komt. Geen callcenter, geen onderaannemers, geen wisselende gezichten. Elk project begeleiden wij persoonlijk van de eerste offerte tot en met de eindoplevering.
        - generic [ref=e120]:
          - generic [ref=e121]: "03"
          - paragraph [ref=e122]: Wij werken uitsluitend met kwalitatieve verfproducten. Een goede verflaag beschermt uw woning voor jaren en bespaart u op termijn kosten. Dat is de investering die wij u adviseren, en de kwaliteit die wij zonder uitzondering leveren.
