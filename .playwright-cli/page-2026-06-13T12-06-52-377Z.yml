            - region "Hoe kan ik een game kopen?":
              - paragraph [ref=e148]: Maak een gratis account aan, voeg een game toe aan je winkelwagen en reken af via onze beveiligde betaalpagina. Na betaling heb je direct toegang. Geen wachttijd.
