            - region "Moet ik een account aanmaken om te bestellen?":
              - paragraph [ref=e155]: Ja, een account is nodig om te kopen en je bestellingen te beheren. Registreren is gratis en duurt minder dan een minuut. Je krijgt er ook een favorietenlijst bij.
