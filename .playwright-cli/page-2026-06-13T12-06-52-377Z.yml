            - region "Hoe ontvang ik mijn aankoop na betaling?":
              - paragraph [ref=e169]: Direct na betaling staat je game klaar in je accountoverzicht. Geen downloads of installaties, je speelt meteen vanuit je browser.
          - generic [ref=e170]:
            - button "Kan ik een game retourneren?" [ref=e171] [cursor=pointer]:
              - generic [ref=e172]: Kan ik een game retourneren?
              - img [ref=e174]
            - region "Kan ik een game retourneren?":
              - paragraph [ref=e176]: Digitale producten zijn direct beschikbaar na aankoop, dus retourneren is in de meeste gevallen niet mogelijk. Heb je toch een probleem? Neem contact op, we zoeken altijd naar een passende oplossing.
          - generic [ref=e177]:
            - button "Hoe voeg ik games toe aan mijn favorieten?" [ref=e178] [cursor=pointer]:
              - generic [ref=e179]: Hoe voeg ik games toe aan mijn favorieten?
              - img [ref=e181]
            - region "Hoe voeg ik games toe aan mijn favorieten?":
              - paragraph [ref=e183]: Klik op het hartje op een gamekaart of productpagina om een game op te slaan. Je favorieten vind je altijd terug via het hart-icoontje in de navigatie.
          - generic [ref=e184]:
            - button "Hoe neem ik contact op met de klantenservice?" [ref=e185] [cursor=pointer]:
              - generic [ref=e186]: Hoe neem ik contact op met de klantenservice?
              - img [ref=e188]
            - region "Hoe neem ik contact op met de klantenservice?":
              - paragraph [ref=e190]: Gebruik het contactformulier op onze contactpagina. We reageren binnen één werkdag. Vul je melding zo volledig mogelijk in, dan kunnen we je sneller helpen.
