            - button "Wat zijn text-based adventure games?" [ref=e157] [cursor=pointer]:
              - generic [ref=e158]: Wat zijn text-based adventure games?
              - img [ref=e160]
            - region "Wat zijn text-based adventure games?":
              - paragraph [ref=e162]: Text-based adventures zijn verhaalgedreven games waarbij jouw keuzes de uitkomst bepalen. Geen complexe graphics, puur verhaal, sfeer en spanning. Elke beslissing kan het verloop veranderen, waardoor geen twee speelsessies hetzelfde zijn.
