          - button "Hoe kan ik een game kopen?" [ref=e164] [cursor=pointer]:
            - generic [ref=e165]: Hoe kan ik een game kopen?
            - img [ref=e167]
          - region "Hoe kan ik een game kopen?":
            - paragraph [ref=e169]: Maak een gratis account aan, voeg een game toe aan je winkelwagen en reken af via onze beveiligde betaalpagina. Na betaling heb je direct toegang. Geen wachttijd.
        - generic [ref=e170]:
          - button "Moet ik een account aanmaken om te bestellen?" [ref=e171] [cursor=pointer]:
            - generic [ref=e172]: Moet ik een account aanmaken om te bestellen?
            - img [ref=e174]
          - region "Moet ik een account aanmaken om te bestellen?":
            - paragraph [ref=e176]: Ja, een account is nodig om te kopen en je bestellingen te beheren. Registreren is gratis en duurt minder dan een minuut. Je krijgt er ook een favorietenlijst bij.
        - generic [ref=e177]:
          - button "Wat zijn text-based adventure games?" [ref=e178] [cursor=pointer]:
            - generic [ref=e179]: Wat zijn text-based adventure games?
            - img [ref=e181]
          - region "Wat zijn text-based adventure games?":
            - paragraph [ref=e183]: Text-based adventures zijn verhaalgedreven games waarbij jouw keuzes de uitkomst bepalen. Geen complexe graphics, puur verhaal, sfeer en spanning. Elke beslissing kan het verloop veranderen, waardoor geen twee speelsessies hetzelfde zijn.
        - generic [ref=e184]:
          - button "Hoe ontvang ik mijn aankoop na betaling?" [ref=e185] [cursor=pointer]:
            - generic [ref=e186]: Hoe ontvang ik mijn aankoop na betaling?
            - img [ref=e188]
          - region "Hoe ontvang ik mijn aankoop na betaling?":
            - paragraph [ref=e190]: Direct na betaling staat je game klaar in je accountoverzicht. Geen downloads of installaties, je speelt meteen vanuit je browser.
        - generic [ref=e191]:
          - button "Kan ik een game retourneren?" [ref=e192] [cursor=pointer]:
            - generic [ref=e193]: Kan ik een game retourneren?
            - img [ref=e195]
          - region "Kan ik een game retourneren?":
            - paragraph [ref=e197]: Digitale producten zijn direct beschikbaar na aankoop, dus retourneren is in de meeste gevallen niet mogelijk. Heb je toch een probleem? Neem contact op, we zoeken altijd naar een passende oplossing.
        - generic [ref=e198]:
          - button "Hoe voeg ik games toe aan mijn favorieten?" [ref=e199] [cursor=pointer]:
            - generic [ref=e200]: Hoe voeg ik games toe aan mijn favorieten?
            - img [ref=e202]
          - region "Hoe voeg ik games toe aan mijn favorieten?":
            - paragraph [ref=e204]: Klik op het hartje op een gamekaart of productpagina om een game op te slaan. Je favorieten vind je altijd terug via het hart-icoontje in de navigatie.
        - generic [ref=e205]:
          - button "Hoe neem ik contact op met de klantenservice?" [ref=e206] [cursor=pointer]:
            - generic [ref=e207]: Hoe neem ik contact op met de klantenservice?
            - img [ref=e209]
          - region "Hoe neem ik contact op met de klantenservice?":
            - paragraph [ref=e211]: Gebruik het contactformulier op onze contactpagina. We reageren binnen één werkdag. Vul je melding zo volledig mogelijk in, dan kunnen we je sneller helpen.
